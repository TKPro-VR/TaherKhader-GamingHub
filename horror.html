<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faznight Shift - 3D Free Roam</title>
  <link rel="stylesheet" href="horror.css">
</head>
<body>
  <main class="shell">
    <h1>Faznight Shift</h1>
    <p class="subtitle">FNAF-inspired 3D free roam demo. Find all battery cells, then reach the exit door.</p>

    <div class="hud">
      <span>Cells: <strong id="cells">0</strong>/4</span>
      <span>Power: <strong id="power">100</strong>%</span>
      <span>Status: <strong id="status">Stay hidden.</strong></span>
      <button id="restartBtn" type="button">Restart</button>
    </div>

    <canvas id="view" width="900" height="500" aria-label="3d game view"></canvas>

    <div class="controls">
      <p>Controls: <kbd>W A S D</kbd> move, <kbd>← →</kbd> look, <kbd>Shift</kbd> sprint.</p>
      <div class="touch-grid" aria-label="touch controls">
        <button data-key="ArrowLeft">⟲</button>
        <button data-key="w">▲</button>
        <button data-key="ArrowRight">⟳</button>
        <button data-key="a">◀</button>
        <button data-key="s">▼</button>
        <button data-key="d">▶</button>
      </div>
    </div>
  </main>
  <script src="horror.js"></script>
</body>
</html>
